name: Test Automation CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Установка uv
        uses: astral-sh/setup-uv@v3
      - name: Установка зависимостей
        run: uv sync --extra dev
      - name: Запуск Ruff
        run: uv run ruff check .
      - name: Запуск MyPy
        run: uv run mypy .
      - name: Запуск Bandit
        run: uv run bandit -r core/ pages/ utils/ config/

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Установка uv
        uses: astral-sh/setup-uv@v3
      - name: Установка зависимостей
        run: uv sync --extra dev
      - name: Запуск Unit-тестов
        run: uv run pytest tests/unit/ -v --tb=short

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Установка uv
        uses: astral-sh/setup-uv@v3
      - name: Установка зависимостей
        run: uv sync --extra dev
      - name: Запуск Интеграционных тестов
        run: uv run pytest tests/integration/ -v --tb=short
        env:
          API_BASE_URL: https://russia-tv.online/api

  e2e-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chromium, firefox]
    steps:
      - uses: actions/checkout@v4
      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Установка uv
        uses: astral-sh/setup-uv@v3
      - name: Установка зависимостей
        run: uv sync --extra dev
      - name: Установка браузеров Playwright
        run: uv run playwright install --with-deps ${{ matrix.browser }}
      - name: Запуск E2E-тестов
        run: uv run pytest tests/e2e/ -v
        env:
          HEADLESS: true
          BROWSER: ${{ matrix.browser }}
      - name: Загрузка результатов Allure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}
          path: reports/allure-results/
      - name: Загрузка скриншотов
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.browser }}
          path: reports/screenshots/
