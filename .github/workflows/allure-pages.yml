name: Allure Report to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      suite:
        description: "Набор тестов для генерации отчёта"
        required: true
        default: "e2e"
        type: choice
        options:
          - smoke
          - unit
          - integration
          - e2e
      browser:
        description: "Браузер для E2E (только при suite=e2e)"
        required: true
        default: "chromium"
        type: choice
        options:
          - chromium
          - firefox
          - webkit

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Установка Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Установка uv
        uses: astral-sh/setup-uv@v3

      - name: Установка зависимостей
        run: uv sync --extra dev

      - name: Установка браузеров Playwright (для E2E)
        if: github.event.inputs.suite == 'e2e'
        run: uv run playwright install --with-deps ${{ github.event.inputs.browser }}

      - name: Установка axe-core
        if: github.event.inputs.suite == 'e2e'
        run: npm ci

      - name: Запуск тестов и генерация Allure-результатов
        run: |
          if [ "${{ github.event.inputs.suite }}" = "e2e" ]; then
            uv run pytest tests/e2e/ -v --alluredir=reports/allure-results
          elif [ "${{ github.event.inputs.suite }}" = "integration" ]; then
            uv run pytest tests/integration/ -v --alluredir=reports/allure-results
          elif [ "${{ github.event.inputs.suite }}" = "unit" ]; then
            uv run pytest tests/unit/ -v --alluredir=reports/allure-results
          else
            uv run pytest tests/smoke/ -v --alluredir=reports/allure-results
          fi
        env:
          HEADLESS: true
          BROWSER: ${{ github.event.inputs.browser }}

      - name: Генерация Allure HTML-отчёта
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: reports/allure-results
          allure_history: allure-history
          keep_reports: 20

      - name: Загрузка страницы как артефакта
        uses: actions/upload-pages-artifact@v3
        if: always()
        with:
          path: allure-history

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Развёртывание на GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
